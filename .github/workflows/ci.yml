name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-godot:
    name: Validate Godot project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --path src --import

      - name: Check Web export
        run: |
          mkdir -p /tmp/patch-notes-web
          godot --headless --path src --export-release "Web" /tmp/patch-notes-web/index.html
