name: Validate and Publish itch.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-and-publish:
    name: Validate and publish Web export
    runs-on: ubuntu-latest
    env:
      WEB_BUILD_DIR: build/web
      ASSET_DIR: dist
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: true

      - name: Validate Godot Web export
        run: bash .github/scripts/validate-godot-web-export.sh "$WEB_BUILD_DIR"

      - name: Package Web build
        run: bash .github/scripts/package-web-build.sh "$WEB_BUILD_DIR" "$ASSET_DIR" "$TAG_NAME"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/create-github-release.sh "$TAG_NAME" "$ASSET_PATH"

      - name: Install Butler
        run: bash .github/scripts/install-butler.sh

      - name: Upload Web build to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: josephblt-games/patch-notes:web
        run: bash .github/scripts/upload-itch-web-build.sh "$WEB_BUILD_DIR" "$ITCH_TARGET" "$TAG_NAME"
