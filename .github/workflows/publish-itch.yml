name: Validate and Publish itch.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-and-publish:
    name: Validate and publish Web export
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate Godot Web export
        id: validate-web
        uses: ./.github/actions/validate-godot-web

      - name: Define release asset
        run: |
          echo "ASSET_DIR=dist" >> "$GITHUB_ENV"
          echo "ASSET_NAME=patch-notes-web-${TAG_NAME}.zip" >> "$GITHUB_ENV"

      - name: Package Web build
        run: |
          mkdir -p "$ASSET_DIR"
          cd "${{ steps.validate-web.outputs.build-dir }}"
          zip -qr "$GITHUB_WORKSPACE/$ASSET_DIR/$ASSET_NAME" .

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ASSET_DIR/$ASSET_NAME" --clobber
          else
            gh release create "$TAG_NAME" \
              "$ASSET_DIR/$ASSET_NAME" \
              --title "$TAG_NAME" \
              --notes "Godot Web build for $TAG_NAME."
          fi

      - name: Install Butler
        run: |
          curl -fsSL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/butler
          butler -V

      - name: Upload Web build to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: josephblt-games/patch-notes:web
        run: butler push "${{ steps.validate-web.outputs.build-dir }}" "$ITCH_TARGET" --userversion "$TAG_NAME"
